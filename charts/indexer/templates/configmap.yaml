apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "indexer.fullname" . }}-config
  labels:
    app: {{ include "indexer.name" . }}
data:
  config.yaml: |
    kafka:
      brokers:
        - {{ .Values.config.kafka.brokers }}
      topic: {{ .Values.config.kafka.topic }}
      group_id: {{ .Values.config.kafka.groupId }}
    elasticsearch:
      host: {{ .Values.config.elasticsearch.host }}
      port: {{ .Values.config.elasticsearch.port }}
      index: {{ .Values.config.elasticsearch.index }}
